<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GlobalPulse">
<meta name="theme-color" content="#07090f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>GlobalPulse 環球脈搏</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'PingFang HK', sans-serif;
    background: #07090f; color: #d8e0f0;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
    text-align: center;
  }
  .logo { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 24px; font-weight: 800; color: #f0d060; margin-bottom: 8px; }
  .sub { font-size: 14px; color: #5a6880; margin-bottom: 32px; }
  .card {
    background: #0e1117; border: 1px solid #1e2535; border-radius: 16px;
    padding: 24px; max-width: 340px; width: 100%; margin-bottom: 16px;
  }
  .card h3 { font-size: 14px; color: #38d9c0; margin-bottom: 12px; font-weight: 700; }
  .step {
    display: flex; gap: 10px; align-items: flex-start;
    margin-bottom: 10px; font-size: 13px; color: #a0b0c8; text-align: left;
  }
  .num {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    background: #f0d060; color: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900;
  }
  .status {
    background: #0a2a1a; border: 1px solid #1a5030; border-radius: 10px;
    padding: 12px 16px; color: #38d080; font-size: 13px;
  }
  .spin {
    display: inline-block;
    animation: spin 2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="logo">🌐</div>
  <h1>GlobalPulse 環球脈搏</h1>
  <p class="sub">每日環球財經新聞 · Google Trends · 投資分析</p>

  <div class="card">
    <h3>⚙️ 系統初始化中</h3>
    <div class="status">
      <span class="spin">⟳</span> GitHub Actions 正在執行首次新聞抓取...<br>
      <span style="font-size:11px;color:#1a5030;margin-top:6px;display:block;">
        約 2-3 分鐘後自動刷新顯示今日新聞
      </span>
    </div>
  </div>

  <div class="card">
    <h3>📱 安裝為 iPhone App</h3>
    <div class="step"><div class="num">1</div><div>用 <strong>Safari</strong> 開啟本頁</div></div>
    <div class="step"><div class="num">2</div><div>點底部 <strong>「分享」</strong> 按鈕</div></div>
    <div class="step"><div class="num">3</div><div>選 <strong>「加入主畫面」</strong></div></div>
    <div class="step"><div class="num">4</div><div>點 <strong>「加入」</strong> — 完成！每天自動更新 ✅</div></div>
  </div>

  <p style="font-size:11px;color:#2a3545;margin-top:8px;">
    每天 HKT 07:00 自動更新 · 數據來源：BBC · Reuters · NewsAPI · Google Trends
  </p>

<script>
  // Auto-refresh every 60 seconds while waiting for first build
  setTimeout(() => location.reload(), 60000);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
